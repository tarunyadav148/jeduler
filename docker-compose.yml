services:
  postgres:
    image: postgres:16-alpine
    container_name: jeduler-postgres
    environment:
      POSTGRES_DB: jeduler
      POSTGRES_USER: scheduler
      POSTGRES_PASSWORD: scheduler
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scheduler -d jeduler"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: jeduler-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --appendfsync everysec
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  kafka:
    image: apache/kafka:3.7.0
    container_name: jeduler-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jeduler-scheduler
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: jeduler
      DB_USER: scheduler
      DB_PASSWORD: scheduler
      DB_POOL_SIZE: 10
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
      SCHEDULER_ENABLED: 'true'
      SCHEDULER_THREAD_POOL: 10
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: jeduler-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      scheduler:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  grafana:
    image: grafana/grafana-oss:10.4.0
    container_name: jeduler-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  demo-producer:
    build:
      context: ./demo
      dockerfile: Dockerfile.producer
    container_name: jeduler-demo-producer
    environment:
      SCHEDULER_URL: http://scheduler:8080
      MODE: steady
      RATE: 2
      JOB_TYPES: vulnerability-scan,code-analysis,compliance-check
    depends_on:
      scheduler:
        condition: service_healthy
    profiles:
      - demo
    restart: unless-stopped

  demo-consumer:
    build:
      context: ./demo
      dockerfile: Dockerfile.consumer
    container_name: jeduler-demo-consumer
    environment:
      KAFKA_BROKERS: kafka:9092
      SCHEDULER_URL: http://scheduler:8080
      JOB_TYPES: vulnerability-scan,code-analysis,compliance-check
      HEARTBEAT_INTERVAL: 15
      FAILURE_RATE: 0.1
      MIN_PROCESSING_TIME: 5
      MAX_PROCESSING_TIME: 30
    depends_on:
      scheduler:
        condition: service_healthy
      kafka:
        condition: service_healthy
    profiles:
      - demo
    restart: unless-stopped

volumes:
  postgres-data:
  grafana-data:
